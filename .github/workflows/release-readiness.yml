name: Release Readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build releasable packages
        run: bun run build

      - name: Run Vitest suite
        run: bun run test:run

      - name: Publish summary
        if: always()
        run: |
          echo "## Release Readiness Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow mirrors the non-publishing checks from \`bun run release:prepare\`." >> "$GITHUB_STEP_SUMMARY"
          echo "It validates build health and the Vitest suite without publishing anything." >> "$GITHUB_STEP_SUMMARY"
