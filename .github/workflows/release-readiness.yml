name: Release Readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install workspace dependencies
        run: npm install

      - name: Ensure manifest versions are synchronized
        run: npm run check:manifest-versions

      - name: Build releasable packages
        run: npm run build

      - name: Run Vitest suite
        run: bun run vitest run

      - name: Validate JSR publish dry-run
        run: npm run jsr:dry-run

      - name: Publish summary
        if: always()
        run: |
          echo "## Release Readiness Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow mirrors the non-publishing checks from \`npm run release:prepare\`." >> "$GITHUB_STEP_SUMMARY"
          echo "It validates manifest sync, build health, Vitest coverage, and JSR dry-run packaging without publishing anything." >> "$GITHUB_STEP_SUMMARY"
