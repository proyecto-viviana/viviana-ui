name: Release Readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release readiness checks
        run: pnpm run ci:release-readiness

      - name: Publish summary
        if: always()
        run: |
          echo "## Release Readiness Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow mirrors \`pnpm run ci:release-readiness\` and the non-publishing checks from \`pnpm run release:prepare\`." >> "$GITHUB_STEP_SUMMARY"
          echo "It validates build health and the Vitest suite without publishing anything." >> "$GITHUB_STEP_SUMMARY"
