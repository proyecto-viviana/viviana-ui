name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: changesets-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install workspace dependencies
        run: npm install

      - name: Ensure manifest versions are synchronized
        run: npm run check:manifest-versions

      - name: Create release PR or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          version: npm run changeset:version
          publish: npm run changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish JSR packages
        if: steps.changesets.outputs.published == 'true'
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
          PUBLISHED_PACKAGES_JSON: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/publish-jsr-from-changesets.mjs
