name: Changesets Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: changesets-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changesets-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Fetch base branch
        run: git fetch origin main --depth=1

      - name: Ensure manifest versions are synchronized
        run: npm run check:manifest-versions

      - name: Ensure releasable package changes include changesets
        run: |
          CHANGED_FILES="$(git diff --name-only origin/main...HEAD)"
          CHANGED_FILES="$CHANGED_FILES" node scripts/check-changeset-required.mjs

      - name: Validate changesets status
        run: npm run changeset:status
