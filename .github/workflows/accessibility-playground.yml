name: Accessibility Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a11y-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun run --cwd apps/web bunx playwright install --with-deps chromium

      - name: Full playground accessibility scan (AA + best-practice + AAA + experimental)
        run: bun run a11y:axe:playground

      - name: Docs and playground smoke
        run: bun run a11y:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            apps/web/playwright-report
            test-results

      - name: Publish summary
        if: always()
        run: |
          echo "## Accessibility Check Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow is blocking on pull requests." >> "$GITHUB_STEP_SUMMARY"
          echo "Any accessibility failure in the gate must be fixed before merge." >> "$GITHUB_STEP_SUMMARY"
