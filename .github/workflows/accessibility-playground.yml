name: Accessibility Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a11y-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y-gate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun run --cwd apps/web bunx playwright install --with-deps chromium

      - name: Run blocking accessibility checks
        run: bun run ci:a11y

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            apps/web/playwright-report
            test-results

      - name: Publish summary
        if: always()
        run: |
          echo "## Accessibility Check Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow is blocking on pull requests." >> "$GITHUB_STEP_SUMMARY"
          echo "It mirrors \`bun run ci:a11y\` and enforces the blocking AA + smoke gate, with axe \`color-contrast\` temporarily excluded." >> "$GITHUB_STEP_SUMMARY"
          echo "Stricter contrast, best-practice, AAA, and experimental scans remain available via \`bun run a11y:full\`." >> "$GITHUB_STEP_SUMMARY"
